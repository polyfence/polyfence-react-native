name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typescript:
    name: TypeScript & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --passWithNoTests

  android:
    name: Android Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build
        run: ./gradlew build

  ios:
    name: iOS Podspec Validation
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate podspec syntax
        run: pod spec lint polyfence-react-native.podspec --allow-warnings --no-clean 2>&1 | head -20 || true

      - name: Verify podspec is parseable
        run: |
          ruby -e "
            require 'cocoapods-core'
            spec = Pod::Specification.from_file('polyfence-react-native.podspec')
            raise 'Missing name' if spec.name.nil?
            raise 'Missing version' if spec.version.to_s.empty?
            raise 'Missing license' if spec.license.nil?
            raise 'Missing author' if spec.authors.empty?
            puts \"Podspec valid: #{spec.name} #{spec.version}\"
            puts \"  License: #{spec.license[:type] || spec.license[:file]}\"
            puts \"  Platform: iOS #{spec.deployment_target('ios')}\"
            puts \"  Dependencies: #{spec.dependencies.map(&:name).join(', ')}\"
          "

  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check for emojis in production code
        run: |
          if grep -rPn '[\x{1F600}-\x{1F64F}\x{1F300}-\x{1F5FF}\x{1F680}-\x{1F6FF}\x{1F1E0}-\x{1F1FF}\x{2702}-\x{27B0}\x{FE00}-\x{FE0F}\x{1F900}-\x{1F9FF}]' src/ android/src/ ios/ 2>/dev/null; then
            echo "::error::Emojis found in production code"
            exit 1
          fi

      - name: Check for internal files
        run: |
          for file in CLAUDE.md .cursorrules; do
            if [ -f "$file" ] && git ls-files --error-unmatch "$file" 2>/dev/null; then
              echo "::error::Internal file $file is tracked in git"
              exit 1
            fi
          done
          if git ls-files | grep -q "^tasks/"; then
            echo "::error::tasks/ directory is tracked in git"
            exit 1
          fi

      - name: Check for secrets
        run: |
          if grep -rPn '(sk_live_|sk_test_|pk_live_|pk_test_|AKIA[A-Z0-9]{16}|ghp_[a-zA-Z0-9]{36}|xoxb-|xoxp-)' --include="*.ts" --include="*.tsx" --include="*.js" --include="*.kt" --include="*.swift" --include="*.m" --include="*.yaml" --include="*.yml" --include="*.json" . 2>/dev/null | grep -v node_modules | grep -v ".gradle"; then
            echo "::error::Potential secrets found in code"
            exit 1
          fi
