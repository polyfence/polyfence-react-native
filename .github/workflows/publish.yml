name: Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  validate-version-sync:
    name: Validate Version Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate versions match
        run: |
          # Extract version from tag (remove 'v' prefix)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          # Extract version from package.json
          PACKAGE_VERSION=$(grep -oP '"version":\s*"\K[^"]+' package.json)
          echo "Package.json version: $PACKAGE_VERSION"

          # Validate versions match
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match package.json version ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "✓ Versions match: $TAG_VERSION"

  validate-code:
    name: Validate TypeScript & Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript compiler
        run: npm run typescript

      - name: Run linter
        run: npm run lint

      - name: Run tests
        run: npm test

  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: [validate-version-sync, validate-code]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [publish-npm]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
