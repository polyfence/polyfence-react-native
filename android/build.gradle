buildscript {
    ext.safeExtGet = {prop, fallback ->
        rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath "com.android.tools.build:gradle:${safeExtGet('agpVersion', '8.2.0')}"
        classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:${safeExtGet('kotlinVersion', '1.9.25')}"
    }
}

apply plugin: 'com.android.library'
apply plugin: 'kotlin-android'

android {
    namespace "io.polyfence.reactnative"
    compileSdkVersion safeExtGet('compileSdkVersion', 35)

    defaultConfig {
        minSdkVersion safeExtGet('minSdkVersion', 24)
        targetSdkVersion safeExtGet('targetSdkVersion', 35)
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    sourceSets {
        main {
            java.srcDirs += 'src/main/kotlin'
        }
    }

    lintOptions {
        baseline file("lint-baseline.xml")
    }
}

repositories {
    mavenCentral()
    google()
}

dependencies {
    compileOnly "com.facebook.react:react-android:${safeExtGet('reactNativeVersion', '0.76.7')}"
    implementation "io.polyfence:polyfence-core:1.0.5"
    implementation "com.google.android.gms:play-services-location:21.3.0"
    implementation "androidx.core:core-ktx:1.15.0"
}
